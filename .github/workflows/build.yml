name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller qrcode

      - name: Build EXE
        run: |
          pyinstaller --name "文字二维码分享工具" --onefile --console text_share.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: qr-share-exe
          path: dist/文字二维码分享工具.exe